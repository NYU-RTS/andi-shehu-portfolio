<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="800" fill="#F4F2EE"/>
  <rect x="48" y="48" width="1104" height="704" rx="24" fill="#FBFAF8" stroke="#D8D2C8"/>
  <text x="96" y="126" fill="#404040" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="700">Clinical evidence translation</text>
  <text x="96" y="164" fill="#6D6D6D" font-family="Arial, Helvetica, sans-serif" font-size="22">Point-of-care guidance for substance use, harm reduction, and clinical communication.</text>

  <rect x="96" y="222" width="1008" height="100" rx="24" fill="#FFFFFF" stroke="#D6D6D6"/>
  <text x="132" y="270" fill="#57068C" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Clinical question</text>
  <text x="132" y="304" fill="#404040" font-family="Arial, Helvetica, sans-serif" font-size="26">How should I discuss overdose risk and harm reduction options with a patient?</text>

  <rect x="96" y="356" width="470" height="320" rx="24" fill="#FFFFFF" stroke="#D6D6D6"/>
  <text x="132" y="406" fill="#57068C" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Evidence trace</text>
  <rect x="132" y="438" width="120" height="34" rx="12" fill="#F1E9F8"/>
  <text x="158" y="460" fill="#57068C" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Citation 01</text>
  <text x="132" y="506" fill="#404040" font-family="Arial, Helvetica, sans-serif" font-size="20">Low-threshold counseling and overdose education</text>
  <text x="132" y="536" fill="#6D6D6D" font-family="Arial, Helvetica, sans-serif" font-size="18">Source-grounded guidance tied to current evidence</text>
  <line x1="132" y1="566" x2="530" y2="566" stroke="#E2D8EA"/>
  <rect x="132" y="590" width="120" height="34" rx="12" fill="#F7F2EC"/>
  <text x="158" y="612" fill="#57068C" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Citation 02</text>
  <text x="274" y="612" fill="#404040" font-family="Arial, Helvetica, sans-serif" font-size="18">Non-stigmatizing communication practices</text>

  <rect x="602" y="356" width="502" height="320" rx="24" fill="#1F2023"/>
  <text x="640" y="406" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Clinician guidance</text>
  <rect x="640" y="436" width="156" height="34" rx="12" fill="#57068C"/>
  <text x="672" y="458" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Evidence-based</text>
  <text x="640" y="512" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="20">Use nonjudgmental language, assess overdose risk,</text>
  <text x="640" y="544" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="20">and offer harm reduction options that match the</text>
  <text x="640" y="576" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="20">patient’s context and readiness for care.</text>
  <rect x="640" y="610" width="140" height="34" rx="12" fill="#3A3C40"/>
  <text x="670" y="632" fill="#F3F1ED" font-family="Arial, Helvetica, sans-serif" font-size="16">workflow fit</text>
  <rect x="792" y="610" width="178" height="34" rx="12" fill="#3A3C40"/>
  <text x="820" y="632" fill="#F3F1ED" font-family="Arial, Helvetica, sans-serif" font-size="16">trust and usability</text>
</svg>
